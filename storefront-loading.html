<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading — Shop-in-a-Box</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: white;
      color: #000;
    }

    .header {
      border-bottom: 1px solid #e6e6e6;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .search-placeholder {
      width: 200px;
      height: 36px;
      background: #f5f5f5;
      border-radius: 4px;
      border: 1px solid #e6e6e6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .shop-name-skeleton {
      width: 250px;
      height: 32px;
      background: #f0f0f0;
      border-radius: 4px;
      margin: 0 auto 12px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .shop-desc-skeleton {
      width: 400px;
      height: 16px;
      background: #f5f5f5;
      border-radius: 4px;
      margin: 0 auto;
      animation: pulse 1.5s ease-in-out infinite 0.2s both;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 24px;
    }

    .product-card {
      border: 1px solid #e6e6e6;
      border-radius: 6px;
      overflow: hidden;
    }

    .product-image {
      width: 100%;
      height: 200px;
      background: #f5f5f5;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .product-content {
      padding: 16px;
    }

    .product-name {
      width: 70%;
      height: 16px;
      background: #f0f0f0;
      border-radius: 3px;
      margin-bottom: 12px;
      animation: pulse 1.5s ease-in-out infinite 0.1s both;
    }

    .product-price {
      width: 40%;
      height: 14px;
      background: #f5f5f5;
      border-radius: 3px;
      animation: pulse 1.5s ease-in-out infinite 0.2s both;
    }

    .product-button {
      width: 100%;
      height: 36px;
      background: #f0f0f0;
      border-radius: 3px;
      margin-top: 12px;
      animation: pulse 1.5s ease-in-out infinite 0.15s both;
    }

    /* Loading message */
    .loading-message {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #e6e6e6;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      margin-right: 12px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      display: inline-block;
      vertical-align: middle;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 16px;
      }

      .products-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .shop-name-skeleton {
        width: 100%;
      }

      .shop-desc-skeleton {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Shop-in-a-Box</div>
    <div class="search-placeholder"></div>
  </div>

  <div class="container">
    <div class="hero">
      <div class="shop-name-skeleton"></div>
      <div class="shop-desc-skeleton"></div>
    </div>

    <div class="products-grid">
      <div class="product-card">
        <div class="product-image"></div>
        <div class="product-content">
          <div class="product-name"></div>
          <div class="product-price"></div>
          <div class="product-button"></div>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image"></div>
        <div class="product-content">
          <div class="product-name"></div>
          <div class="product-price"></div>
          <div class="product-button"></div>
        </div>
      </div>

      <div class="product-card">
        <div class="product-image"></div>
        <div class="product-content">
          <div class="product-name"></div>
          <div class="product-price"></div>
          <div class="product-button"></div>
        </div>
      </div>
    </div>

    <div class="loading-message" style="margin-top: 60px;">
      <span class="spinner"></span>
      <span class="loading-text">Loading your shop...</span>
    </div>
  </div>
</body>
</html>
