<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <style>
    :root {
      --color-primary: #2c3e50;
      --color-accent: #e74c3c;
      --color-border: #ecf0f1;
      --color-bg: #fafafa;
      --color-text: #2c3e50;
      --color-success: #27ae60;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
      --type-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--type-sans);
      color: var(--color-text);
      background: var(--color-bg);
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: var(--spacing-lg);
    }

    .header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: var(--color-primary);
    }

    .order-summary {
      background: white;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-md);
      font-size: 14px;
    }

    .summary-row:last-child {
      margin-bottom: 0;
      border-top: 1px solid var(--color-border);
      padding-top: var(--spacing-md);
      margin-top: var(--spacing-md);
    }

    .summary-label {
      color: #7f8c8d;
    }

    .summary-value {
      font-weight: 600;
      color: var(--color-primary);
    }

    .summary-total .summary-value {
      font-size: 16px;
      color: var(--color-accent);
    }

    .form-section {
      background: white;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .form-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: var(--spacing-md);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group {
      margin-bottom: var(--spacing-md);
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-primary);
      margin-bottom: var(--spacing-sm);
    }

    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--color-border);
      border-radius: 3px;
      font-family: var(--type-sans);
      transition: border-color 0.2s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    select:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
    }

    .btn {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-primary {
      background: var(--color-accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #c0392b;
    }

    .btn-primary:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }

    .error-message {
      background: #fadbd8;
      border: 1px solid #f5b7b1;
      border-radius: 3px;
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      font-size: 13px;
      color: #922b21;
    }

    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Checkout</h1>
    </div>

    <div id="error-container"></div>

    <form id="checkout-form" style="display: none;">
      <div class="order-summary">
        <div class="summary-row">
          <span class="summary-label" id="product-name">Loading...</span>
          <span class="summary-value">$0.00</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">Quantity</span>
          <span class="summary-value">1</span>
        </div>
        <div class="summary-row summary-total">
          <span class="summary-label">Total</span>
          <span class="summary-value" id="total-price">$0.00</span>
        </div>
      </div>

      <div class="form-section">
        <h2>Customer info</h2>
        <div class="form-group">
          <label for="customer-name">Full name</label>
          <input type="text" id="customer-name" name="customerName" data-testid="customer-name" required placeholder="Alice Smith">
        </div>
        <div class="form-group">
          <label for="customer-email">Email address</label>
          <input type="email" id="customer-email" name="customerEmail" data-testid="customer-email" required placeholder="alice@example.com">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="submit-btn" data-testid="submit-order">
        Complete purchase
      </button>
    </form>

    <div id="loading-container" style="text-align: center; padding: 40px;">
      <div class="loading-spinner"></div>
      <p style="margin-top: 16px; font-size: 14px; color: #7f8c8d;">Loading product details...</p>
    </div>
  </div>

  <script>
    // Parse URL parameters (/checkout/:merchantId?product=xxx)
    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      const pathParts = window.location.pathname.split('/');
      return {
        productId: params.get('product'),
        merchantId: pathParts[2] // /checkout/:merchantId -> index 2
      };
    }

    // Show error and hide form
    function showError(title, message) {
      const errorContainer = document.getElementById('error-container');
      errorContainer.innerHTML = `
        <div class="error-message">
          <strong>${title}</strong><br>${message}
        </div>
      `;
      document.getElementById('loading-container').style.display = 'none';
      document.getElementById('checkout-form').style.display = 'none';
    }

    // Fetch product details
    async function loadProduct(merchantId, productId) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);

      try {
        const response = await fetch(`/api/merchant/${merchantId}`, {
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (!response.ok) {
          showError(
            'Shop not found',
            'The shop associated with this product doesn't exist.'
          );
          return null;
        }

        const data = await response.json();
        const product = data.items?.find(p => p.id === productId);

        if (!product) {
          showError(
            'Product not found',
            'This product doesn't exist in the shop.'
          );
          return null;
        }

        return { product, merchantId: data.id };
      } catch (error) {
        clearTimeout(timeoutId);
        showError(
          'Error loading product',
          'Check your connection and try again.'
        );
        return null;
      }
    }

    // Store product data globally for form submission
    let currentProduct = null;
    let currentMerchantId = null;

    // Render product details
    function renderProduct(data) {
      const { product, merchantId } = data;
      currentProduct = product;
      currentMerchantId = merchantId;
      
      document.getElementById('product-name').textContent = product.name;
      document.getElementById('total-price').textContent = `${((product.price || 0) / 100).toFixed(2)}`;
      document.getElementById('loading-container').style.display = 'none';
      document.getElementById('checkout-form').style.display = 'block';
    }

    // Submit order
    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const customerName = document.getElementById('customer-name').value.trim();
      const customerEmail = document.getElementById('customer-email').value.trim();

      if (!customerName || !customerEmail || !currentProduct || !currentMerchantId) {
        showError('Missing fields', 'Please fill in all fields.');
        return;
      }

      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading-spinner"></span> Processing...';

      try {
        const response = await fetch('/api/order/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            merchantId: currentMerchantId,
            items: [{ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, quantity: 1 }],
            customerName,
            customerEmail,
            customerPhone: '',
            customerAddress: '',
            notes: '',
            total: currentProduct.price
          })
        });

        if (!response.ok) {
          showError(
            'Order failed',
            `Something went wrong (${response.status}). Try again.`
          );
          submitBtn.disabled = false;
          submitBtn.textContent = 'Complete purchase';
          return;
        }

        const result = await response.json();
        // Show success message
        document.body.innerHTML = `
          <div class="container">
            <div class="order-summary" style="text-align: center; margin-top: 60px;">
              <h1 style="color: var(--color-success); margin-bottom: 16px;">✓ Order Confirmed</h1>
              <p style="font-size: 14px; color: #7f8c8d; margin-bottom: 24px;">
                ${result.message || 'Thank you for your order! Check your email for confirmation.'}
              </p>
              <p style="font-size: 12px; color: #95a5a6;">Order ID: ${result.orderId}</p>
            </div>
          </div>
        `;
      } catch (error) {
        showError(
          'Network error',
          'Check your connection and try again.'
        );
        submitBtn.disabled = false;
        submitBtn.textContent = 'Complete purchase';
      }
    });

    // Initialize
    const { productId, merchantId } = getQueryParams();

    if (!productId || !merchantId) {
      showError(
        'Invalid link',
        'The checkout link is missing product or shop information.'
      );
    } else {
      loadProduct(merchantId, productId).then(product => {
        if (product) {
          renderProduct(product);
        }
      });
    }
  </script>
</body>
</html>
